# Render (https://render.com) deploy config for the SOP system.
#
# New -> Blueprint -> select this repository. It provisions the web service
# and env vars automatically (you'll be asked for ADMIN_USER / ADMIN_PASS).
#
# NOTE: This config targets Render's FREE plan, which does NOT support a
# persistent disk. The SQLite DB and uploaded files live on the container's
# ephemeral filesystem, so they are RESET on every restart / redeploy (and the
# free instance sleeps after ~15 min of inactivity). Use this for testing only.
#
# To make data persistent, switch `plan: free` to `plan: starter` (paid) and
# re-add a disk:
#     disk:
#       name: sop-data
#       mountPath: /data
#       sizeGB: 1
services:
  - type: web
    name: sop-system
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      # DB_PATH / UPLOAD_DIR default to /data/* (set in the Dockerfile). On the
      # free plan /data is ephemeral but still writable, so no override needed.
      # Session signing key — generated once and kept by Render
      - key: SESSION_SECRET
        generateValue: true
      # Set your own admin credentials in the Render dashboard
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
