<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in — SOP File Management</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body class="login-page">
    <main class="login-card">
      <h1>📋 SOP File Management</h1>
      <p class="subtitle">Please sign in</p>

      <!-- Posts to /checklogin as a form, per spec -->
      <form method="post" action="/checklogin" class="login-form">
        <label>
          Username
          <input type="text" name="username" autocomplete="username" required autofocus />
        </label>
        <label>
          Password
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Sign in</button>
      </form>

      <p id="error" class="error" hidden>Incorrect username or password</p>
    </main>

    <script>
      // Show an error if redirected back with ?error=1
      if (new URLSearchParams(location.search).has('error')) {
        document.getElementById('error').hidden = false;
      }
    </script>
  </body>
</html>
