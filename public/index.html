<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SOP File Management System</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>📋 SOP File Management System</h1>
      <div class="user-box">
        <span id="me"></span>
        <form method="post" action="/logout" class="inline">
          <button class="ghost" type="submit">Sign out</button>
        </form>
      </div>
    </header>

    <div class="layout">
      <!-- Sidebar: categories -->
      <aside class="sidebar">
        <h2>Categories</h2>
        <ul id="categoryList" class="category-list"></ul>

        <form id="categoryForm" class="add-category">
          <input type="text" id="newCategory" placeholder="New category" maxlength="50" />
          <button type="submit">Add</button>
        </form>
      </aside>

      <main class="content">
        <!-- Search bar -->
        <section class="searchbar">
          <input type="search" id="search" placeholder="🔍 Search by title, description or file name" />
          <button id="uploadOpen" class="primary">+ Upload</button>
        </section>

        <!-- File list -->
        <section>
          <p id="listInfo" class="list-info"></p>
          <table class="file-table">
            <thead>
              <tr>
                <th>Type</th>
                <th>Title</th>
                <th>Category</th>
                <th>Size</th>
                <th>Uploaded</th>
                <th>By</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="fileRows"></tbody>
          </table>
        </section>
      </main>
    </div>

    <!-- Upload modal -->
    <dialog id="uploadDialog">
      <form id="uploadForm" method="dialog">
        <h2>Upload SOP file</h2>
        <label>
          File (PDF / Excel / Word)
          <input type="file" id="file" name="file" accept=".pdf,.xls,.xlsx,.doc,.docx" required />
        </label>
        <label>
          Title
          <input type="text" id="title" name="title" placeholder="Defaults to the file name if left blank" maxlength="200" />
        </label>
        <label>
          Category
          <select id="uploadCategory" name="category_id"></select>
        </label>
        <label>
          Description (optional)
          <textarea id="description" name="description" rows="3" maxlength="1000"></textarea>
        </label>
        <p id="uploadError" class="error" hidden></p>
        <div class="dialog-actions">
          <button type="button" id="uploadCancel" class="ghost">Cancel</button>
          <button type="submit" class="primary">Upload</button>
        </div>
      </form>
    </dialog>

    <script src="/assets/app.js"></script>
  </body>
</html>
