<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SOP File Management System</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>📋 SOP File Management System</h1>
      <div class="user-box">
        <span id="me"></span>
        <form method="post" action="/logout" class="inline">
          <button class="ghost" type="submit">Sign out</button>
        </form>
      </div>
    </header>

    <div class="layout">
      <!-- Sidebar: collapsible filter axes (collapsed by default) -->
      <aside class="sidebar">
        <!-- Document type axis (QP / SOP / Format) -->
        <section class="axis-section collapsed">
          <h2 class="axis-toggle">Type (種別) <span class="chevron">▸</span></h2>
          <div class="axis-body">
            <ul id="typeList" class="filter-list"></ul>
            <form id="typeForm" class="add-filter">
              <input type="text" id="newType" placeholder="New type" maxlength="50" />
              <button type="submit">Add</button>
            </form>
          </div>
        </section>

        <!-- Department axis -->
        <section class="axis-section collapsed">
          <h2 class="axis-toggle">Department (部署) <span class="chevron">▸</span></h2>
          <div class="axis-body">
            <ul id="departmentList" class="filter-list"></ul>
            <form id="departmentForm" class="add-filter">
              <input type="text" id="newDepartment" placeholder="New department" maxlength="50" />
              <button type="submit">Add</button>
            </form>
          </div>
        </section>

        <!-- Customer axis (optional) -->
        <section class="axis-section collapsed">
          <h2 class="axis-toggle">Customer (顧客) <span class="chevron">▸</span></h2>
          <div class="axis-body">
            <ul id="customerList" class="filter-list"></ul>
            <form id="customerForm" class="add-filter">
              <input type="text" id="newCustomer" placeholder="New customer" maxlength="50" />
              <button type="submit">Add</button>
            </form>
          </div>
        </section>
      </aside>

      <main class="content">
        <!-- Search bar -->
        <section class="searchbar">
          <input type="search" id="search" placeholder="🔍 品番・文書番号・タイトル・品名で検索 (Search: 品番 / doc no / title / product name)" />
          <button id="scanOpen" class="ghost">📷 バーコード</button>
          <button id="uploadOpen" class="primary">+ Upload</button>
        </section>

        <!-- File list -->
        <section>
          <div id="activeCode" class="active-code" hidden></div>
          <div class="list-head">
            <p id="listInfo" class="list-info"></p>
            <label class="show-old">
              <input type="checkbox" id="showOld" /> 旧版も表示
            </label>
          </div>
          <table class="file-table">
            <thead>
              <tr>
                <th></th>
                <th>Doc No. / Rev</th>
                <th>Title</th>
                <th>Type (種別)</th>
                <th>Department (部署)</th>
                <th>Customer (顧客)</th>
                <th>Size</th>
                <th>Uploaded</th>
                <th>By</th>
                <th></th>
              </tr>
              <tr class="filter-row">
                <th></th>
                <th><input type="search" id="fDocref" placeholder="絞込…" /></th>
                <th><input type="search" id="fTitle" placeholder="絞込…" /></th>
                <th><select id="colType"></select></th>
                <th><select id="colDept"></select></th>
                <th><select id="colCust"></select></th>
                <th></th>
                <th></th>
                <th><input type="search" id="fBy" placeholder="絞込…" /></th>
                <th></th>
              </tr>
            </thead>
            <tbody id="fileRows"></tbody>
          </table>
        </section>
      </main>
    </div>

    <!-- Barcode / product-number lookup modal (for the inspection station) -->
    <dialog id="scanDialog">
      <form id="scanForm" method="dialog">
        <h2>🔎 検査仕様書を検索 (バーコード / 品番)</h2>
        <p class="hint">バーコードリーダーで読み取るか、品番を入力して Enter</p>
        <input
          type="text"
          id="scanInput"
          placeholder="品番をスキャン / 入力…"
          autocomplete="off"
          inputmode="text"
        />
        <p id="scanStatus" class="extract-status" hidden></p>
        <ul id="scanResults" class="scan-results"></ul>
        <div class="dialog-actions">
          <button type="button" id="scanClose" class="ghost">閉じる</button>
        </div>
      </form>
    </dialog>

    <!-- Upload modal -->
    <dialog id="uploadDialog">
      <form id="uploadForm" method="dialog">
        <h2>Upload SOP file</h2>
        <label>
          File (PDF / Excel / Word)
          <input type="file" id="file" name="file" accept=".pdf,.xls,.xlsx,.doc,.docx" required />
        </label>
        <p id="extractStatus" class="extract-status" hidden></p>
        <label>
          Document No. <span class="hint">(auto-fills Type &amp; Department, e.g. SOP-QC-0021)</span>
          <input type="text" id="docNo" name="doc_no" placeholder="QP-QC-04" maxlength="100" />
        </label>
        <div class="field-row">
          <label>
            Type (種別) <span class="req">*</span>
            <select id="uploadType" name="doc_type_id" required></select>
          </label>
          <label>
            Department (部署) <span class="req">*</span>
            <select id="uploadDepartment" name="department_id" required></select>
          </label>
        </div>
        <label>
          Customer (顧客) <span class="hint">(optional)</span>
          <select id="uploadCustomer" name="customer_id"></select>
        </label>
        <label>
          Title
          <input type="text" id="title" name="title" placeholder="Defaults to the file name if left blank" maxlength="200" />
        </label>
        <div class="field-row">
          <label>
            Revision (Rev)
            <input type="text" id="revision" name="revision" placeholder="16" maxlength="50" />
          </label>
          <label>
            Document date
            <input type="text" id="docDate" name="doc_date" placeholder="16-May-25" maxlength="50" />
          </label>
        </div>
        <label>
          品名 / Product name <span class="hint">(SOP, optional)</span>
          <input type="text" id="productName" name="product_name" maxlength="200" />
        </label>
        <div class="field-row">
          <label>
            Model <span class="hint">(optional)</span>
            <input type="text" id="model" name="model" maxlength="200" />
          </label>
          <label>
            品番 / Product No. <span class="hint">(barcode lookup key)</span>
            <input type="text" id="productNo" name="product_no" maxlength="500" />
          </label>
        </div>
        <label>
          Description (optional)
          <textarea id="description" name="description" rows="2" maxlength="1000"></textarea>
        </label>
        <p id="uploadError" class="error" hidden></p>
        <div class="dialog-actions">
          <button type="button" id="uploadCancel" class="ghost">Cancel</button>
          <button type="submit" class="primary">Upload</button>
        </div>
      </form>
    </dialog>

    <script src="/assets/app.js"></script>
  </body>
</html>
